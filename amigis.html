<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taco</title>
<link rel="icon" href="imagenes/icono.jpeg">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>

/* 🎛️ VARIABLE SOLO PARA IMÁGENES */
:root {
    --img-size: 270px; /* 🔥 cambia este valor */
}

/* 🔥 RESET TOTAL */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* 🔥 EVITA SCROLL LATERAL */
html, body {
    width: 100%;
    overflow-x: hidden;
}

/* BODY */
body {
    min-height: 100vh;
    font-family: 'Patrick Hand', cursive;

    background-image: url("imagenes/fondoamigos.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* CONTENEDOR */
.container {
    max-width: 900px;
    width: 100%;
    margin: 60px auto;
    padding: 40px;
    text-align: center;
}

/* TEXTO */
h1 {
    font-size: 28px;
    margin-bottom: 40px;
    color: black;
    text-shadow: 2px 2px 6px rgb(84, 81, 81);
}

/* GALERÍA */
.gallery {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

/* TARJETAS */
.card {
    max-width: 100%;
}

/* IMÁGENES */
.card img {
    width: var(--img-size); /* 🔥 tamaño controlable */
    max-width: 100%;
    display: block;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.6);
}

/* BOTONES */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 30px;
    text-decoration: none;
    color: white;
    font-size: 18px;

    box-shadow: 0 6px 0 rgba(0,0,0,0.5);
    transition: 0.2s;
}

.btn.orange {
    background: #d88a4c;
}

.btn.green {
    background: #0f6b63;
}

.btn:hover {
    transform: scale(1.08);
}

.btn:active {
    transform: scale(0.95);
    box-shadow: 0 3px 0 rgba(0,0,0,0.5);
}

/* BOTÓN VOLVER */
.back-btn {
    position: fixed;
    bottom: 20px;
    left: 20px;

    padding: 12px 25px;
    border-radius: 30px;
    text-decoration: none;
    color: black;
    background: #c1a7f0;

    font-size: 16px;

    box-shadow: 0 5px 0 #444;
    transition: 0.2s;
}

.back-btn:hover {
    transform: scale(1.08);
}

.back-btn:active {
    transform: scale(0.95);
    box-shadow: 0 3px 0 #444;
}

/* 📱 CELULAR */
@media (max-width: 600px) {

    :root {
        --img-size: 100%; /* 🔥 se adapta en celular */
    }

    .container {
        margin: 20px;
        padding: 20px;
    }

    h1 {
        font-size: 20px;
    }

    .gallery {
        gap: 20px;
    }

    .back-btn {
        bottom: 15px;
        left: 15px;
        font-size: 14px;
        padding: 10px 18px;
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>
        I decided to include my best friends because they’re the reason I chose to create this page. (｡• ◡ •｡)
    </h1>

    <div class="gallery">

        <div class="card">
            <img src="imagenes/pez.gif">
            <a href="naranja.html" class="btn orange">
                fishmarket (^ω^)
            </a>
        </div>

        <div class="card">
            <img src="imagenes/cat.gif">
            <a href="verde.html" class="btn green">
                BedTime ₍(^o^)₎
            </a>
        </div>

    </div>

</div>

<a href="index.html" class="back-btn">←</a>

</body>
</html>
