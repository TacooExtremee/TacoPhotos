<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taco</title>
<link rel="icon" href="imagenes/icono.jpeg">

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>

:root {
    --titulo-size: clamp(65px, 5vw, 70px);
    --texto-size: clamp(25.5px, 2vw, 26px);
    --boton-size: 20px;
}

body {
    margin: 0;
    height: 100dvh;
    font-family: 'Patrick Hand', cursive;
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;

    background: url("imagenes/Welcome\ to\ my\ website\ \(7\).png") no-repeat center/cover;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.0);
}

.content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 20px;
    max-width: 800px;
}

h1 {
    font-size: var(--titulo-size);
    margin: 0;

    text-shadow:
        2px 2px 0 black,
        -2px 2px 0 black,
        2px -2px 0 black,
        -2px -2px 0 black,
        0 0 8px rgba(255,255,255,0.6);
}

p {
    font-size: var(--texto-size);
    margin-top: 20px;

    text-shadow:
        0 0 6px rgba(255,255,255,0.6),
        1px 1px 3px black;
}

.buttons {
    margin-top: 40px;
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.buttons a {
    text-decoration: none;
    color: black;
    background: rgba(255,255,255,0.85);
    padding: 14px 30px;
    border-radius: 40px;
    font-size: var(--boton-size);

    backdrop-filter: blur(6px);

    box-shadow:
        0 5px 0 #444,
        0 10px 20px rgba(0,0,0,0.4);

    transition: 0.25s;
}

.buttons a:hover {
    transform: scale(1.08);
}

.buttons a:active {
    transform: scale(0.95);
    box-shadow: 0 3px 0 #444;
}

/* 📱 CELULAR */
@media (max-width: 600px) {

    .buttons {
        flex-direction: column;
        gap: 15px;
        margin-top: 30px;
    }

    .buttons a {
        width: 85%;
    }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="content">
    <h1>Welcome to my website</h1>
    <p>I just enjoy taking photos and I<br>hope you like them :3</p>

    <div class="buttons">
        <a href="pagina.html">Gallery [ ◉¯]</a>
        <a href="amigis.html">Friends (´ ω `)</a>
    </div>
</div>

</body>
</html>
