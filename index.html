<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taco</title>
<link rel="icon" href="imagenes/icono.jpeg">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Quicksand', sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;

    background: url("imagenes/inicio\ 2.png") no-repeat center/cover;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.1);
}

.content {
    position: relative;
    z-index: 2;
    padding: 20px;
}

/* ✨ TAMAÑOS AJUSTADOS A TU IMAGEN */
h1 {
    font-size: clamp(32px, 5vw, 70px);
    margin: 0;
    text-shadow: 2px 2px 5px black;
    letter-spacing: 2px;
}

p {
    font-size: clamp(16px, 1.8vw, 26px);
    margin-top: 20px;
    text-shadow: 1px 1px 5px black;
    line-height: 1.5;
}

/* BOTÓN */
.button {
    margin-top: 40px;
}

.button a {
    display: inline-block;
    text-decoration: none;
    color: black;
    background: #ddd;
    padding: 15px 35px;
    border-radius: 30px;
    font-size: clamp(16px, 1.5vw, 22px);
    box-shadow: 0 5px 0 #555;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.button a:hover {
    transform: scale(1.08);
    box-shadow: 0 8px 15px rgba(0,0,0,0.6);
}

.button a:active {
    transform: scale(0.98);
    box-shadow: 0 3px 5px rgba(0,0,0,0.5);
}

/* ESQUINAS */
.corner {
    position: absolute;
    width: 100px;
    height: 80px;
    border: 5px solid white;
}

.top-left {
    top: 20px;
    left: 50px;
    border-right: none;
    border-bottom: none;
}

.top-right {
    top: 20px;
    right: 50px;
    border-left: none;
    border-bottom: none;
}

.bottom-left {
    bottom: 20px;
    left: 50px;
    border-right: none;
    border-top: none;
}

.bottom-right {
    bottom: 20px;
    right: 50px;
    border-left: none;
    border-top: none;
}

/* REC */
.rec {
    position: absolute;
    top: 50px;
    left: 100px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
}

.rec-dot {
    width: 12px;
    height: 12px;
    background: red;
    border-radius: 50%;
}

@keyframes blink {
    50% { opacity: 0; }
}

/* BATERÍA */
.battery {
    position: absolute;
    top: 50px;
    right: 100px;
    width: 50px;
    height: 20px;
    border: 3px solid white;
    border-radius: 3px;
}

.battery::after {
    content: "";
    position: absolute;
    right: -8px;
    top: 5px;
    width: 5px;
    height: 10px;
    background: white;
}

.battery-level {
    height: 100%;
    width: 80%;
    background: white;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="corner top-left"></div>
<div class="corner top-right"></div>
<div class="corner bottom-left"></div>
<div class="corner bottom-right"></div>

<div class="rec">
    <div class="rec-dot"></div>
    REC
</div>

<div class="battery">
    <div class="battery-level"></div>
</div>

<div class="content">
    <h1>Welcome to my website</h1>
    <p>I just enjoy taking photos and I<br>hope you like them :3</p>

    <div class="button">
        <a href="pagina.html">Gallery [ ◉¯]</a>
    </div>
</div>

</body>
</html>
