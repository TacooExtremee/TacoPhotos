<style>
body {
    margin: 0;
    text-align: center;
    color: black;
    background-image: url("imagenes/fondo.png");
    background-size: contain;
    background-position: center;
    background-repeat: repeat;

    position: relative;
    z-index: 1;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.2);
    z-index: 0;
    pointer-events: none;
}

.imgSection {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    max-width: 1200px;
    margin: 40px auto;
    padding: 20px;
}

.card {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 100%;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover img {
    transform: scale(1.05);
}

.texto {
    position: absolute;
    bottom: 10px;
    left: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    padding: 10px;
    opacity: 0;
    transition: 0.3s;
    border-radius: 10px;
}

.card:hover .texto {
    opacity: 1;
}

.blanco { color: white; }

.like {
    position: absolute;
    bottom: 15px;
    right: 20px;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    gap: 6px;
}

.like span {
    color: gold;
}

.sparkle {
    position: absolute;
    animation: explode 0.6s ease-out forwards;
}

@keyframes explode {
    0% {opacity:1;}
    100% {opacity:0; transform: translate(var(--x), var(--y));}
}

/* 📱 RESPONSIVE */
@media (max-width: 768px) {

    .imgSection {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        padding: 15px;
    }

    .card {
        aspect-ratio: 1 / 1;
    }

    .card img {
        height: 100% !important;
    }

    .like {
        font-size: 18px;
        bottom: 10px;
        right: 10px;
    }

    .texto {
        font-size: 14px;
        padding: 6px;
    }
}

/* 📱 MUY PEQUEÑO */
@media (max-width: 480px) {
    .imgSection {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBic8lUwzsAjJ0z7ifJ-3qflFHhXQyEp0c",
    authDomain: "tacogallery.firebaseapp.com",
    projectId: "tacogallery",
    storageBucket: "tacogallery.appspot.com",
    messagingSenderId: "779769141358",
    appId: "1:779769141358:web:350946023b6226f42d0804"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.like = async function(el, id) {

    if (localStorage.getItem(id)) return;

    const ref = doc(db, "likes", id);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
        await setDoc(ref, { count: 1 });
    } else {
        await updateDoc(ref, { count: increment(1) });
    }

    localStorage.setItem(id, true);

    loadLikes();

    for (let i = 0; i < 6; i++) {
        let sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.textContent = "✨";

        sparkle.style.setProperty("--x", (Math.random()*60-30) + "px");
        sparkle.style.setProperty("--y", (Math.random()*-60) + "px");

        el.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 600);
    }
};

async function loadLikes() {
    document.querySelectorAll(".like").forEach(async (el) => {

        let id = el.getAttribute("data-id");

        const ref = doc(db, "likes", id);
        const snap = await getDoc(ref);

        let count = 0;
        if (snap.exists()) {
            count = snap.data().count;
        }

        el.querySelector("span").textContent = count;
    });
}

loadLikes();
</script>
