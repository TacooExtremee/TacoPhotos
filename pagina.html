<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taco</title>
    <link rel="icon" href="imagenes/icono.jpeg">

    <style>
        body {
            margin: 0;
            text-align: center;
            color: black;

            background-image: url("imagenes/fondo.png");
            background-size: contain;
            background-position: center;
            background-repeat: repeat;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: -1;
        }

        .imgSection {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1200px; 
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            position: relative;
            width: 100%;
            max-width: 100%;
            border-radius: 20px;
            overflow: hidden;
            padding: 10px;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
            display: block;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
        }

        .card:hover img {
            transform: scale(1.05);
        }

        .texto {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            opacity: 0;
            transition: 0.3s;
            border-radius: 10px;
        }

        .card:hover .texto {
            opacity: 1;
        }

        .blanco { color: white; }

        /* ⭐ LIKE */
        .like {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 22px;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .like span {
            font-size: 18px;
            color: gold;
            font-weight: bold;
        }

        /* ✨ EXPLOSIÓN */
        .sparkle {
            position: absolute;
            font-size: 18px;
            animation: explode 0.6s ease-out forwards;
            pointer-events: none;
        }

        @keyframes explode {
            0% { opacity: 1; transform: translate(0,0) scale(1); }
            100% { opacity: 0; transform: translate(var(--x), var(--y)) scale(1.5); }
        }

        /* 📱 RESPONSIVE */
        @media (max-width: 768px) {
            .imgSection {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
                padding: 15px;
            }

            .card {
                height: auto !important;
                aspect-ratio: 1 / 1;
                padding: 8px;
            }

            .texto {
                font-size: 14px;
                padding: 8px;
            }
        }

        @media (max-width: 480px) {
            .imgSection {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBic8lUwzsAjJ0z7ifJ-3qflFHhXQyEp0c",
    authDomain: "tacogallery.firebaseapp.com",
    projectId: "tacogallery",
    storageBucket: "tacogallery.appspot.com",
    messagingSenderId: "779769141358",
    appId: "1:779769141358:web:350946023b6226f42d0804"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.like = async function(el, id) {

    if (localStorage.getItem(id)) return;

    const ref = doc(db, "likes", id);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
        await setDoc(ref, { count: 1 });
    } else {
        await updateDoc(ref, { count: increment(1) });
    }

    localStorage.setItem(id, true);

    loadLikes();

    for (let i = 0; i < 6; i++) {
        let sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.textContent = "✨";

        sparkle.style.setProperty("--x", (Math.random()*60-30) + "px");
        sparkle.style.setProperty("--y", (Math.random()*-60) + "px");

        el.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 600);
    }
};

async function loadLikes() {
    document.querySelectorAll(".like").forEach(async (el, i) => {
        let id = "img" + (i + 1);
        const ref = doc(db, "likes", id);
        const snap = await getDoc(ref);

        let count = 0;
        if (snap.exists()) {
            count = snap.data().count;
        }

        el.querySelector("span").textContent = count;
    });
}

loadLikes();
</script>
